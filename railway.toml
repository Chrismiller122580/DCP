# DCP API — Railway deployment
# 1. New Project → Deploy from GitHub (this repo)
# 2. Add PostgreSQL plugin → link DATABASE_URL to the API service (required)
# 3. Add Redis plugin → link REDIS_URL or REDIS_PRIVATE_URL (recommended)
# 4. Set variables on the API service:
#      ADMIN_API_KEY=<strong secret>
#      XRPL_NETWORK=testnet
#      NODE_ENV=production
#    (PORT is set automatically by Railway)
# 5. Generate a public domain for the API service
# 6. In Vercel (web-dashboard), set:
#      API_URL=https://<your-api>.up.railway.app
#      NEXT_PUBLIC_API_URL=
#      NEXT_PUBLIC_API_ORIGIN=https://<your-api>.up.railway.app
#      NEXT_PUBLIC_ADMIN_API_KEY=<same as ADMIN_API_KEY>

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/v1/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10