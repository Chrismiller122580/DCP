# Render Blueprint — DCP API + Postgres
# Deploy: connect repo at render.com → New Blueprint → point to this file
# Then set Vercel API_URL to the Render service URL (e.g. https://dcp-api.onrender.com)

databases:
  - name: dcp-db
    plan: free
    databaseName: dcp
    user: dcp

services:
  - type: web
    name: dcp-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dcp-db
          property: connectionString
      - key: PORT
        value: 4000
      - key: XRPL_NETWORK
        value: testnet
      - key: ADMIN_API_KEY
        generateValue: true
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379
      # Optional: Upstash or Render Redis — set REDIS_HOST after creating Redis instance